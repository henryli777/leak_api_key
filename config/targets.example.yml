# Copy this file to config/targets.yml locally, or set GitHub Secret TARGETS_YAML.
# Keep targets focused on your own brands, domains, repos, project names, or customer identifiers.

timezone: Asia/Shanghai
max_queries: 24

targets:
  keywords: []
  domains: []
  owners: []
  repos: []

queries:
  templates:
    - '"OPENAI_API_KEY" "base_url"'
    - '"OPENAI_BASE_URL" "sk-"'
    - '"api_key" "model" "base_url"'
    - '"ANTHROPIC_API_KEY" "claude"'
    - '"DEEPSEEK_API_KEY" "deepseek"'
    - '"gemini" "base_url" "sk-"'
    - '"OPENROUTER_API_KEY" "sk-or-v1"'
    - '"groq" "base_url" "sk-"'
    - '"MISTRAL_API_KEY"'
    - '"DASHSCOPE_API_KEY" "qwen"'
    - '"grok" "base_url" "sk-"'
  target_templates:
    - '"{target}" "OPENAI_API_KEY"'
    - '"{target}" "OPENAI_BASE_URL"'
    - '"{target}" "base_url" "sk-"'
    - '"{target}" "api_key" "model"'
    - '"{target}" "ANTHROPIC_API_KEY"'
    - '"{target}" "DEEPSEEK_API_KEY"'
    - '"{target}" "gemini" "sk-"'
    - '"{target}" "OPENROUTER_API_KEY"'

sources:
  github:
    enabled: true
    per_query: 12
    delay_seconds: 1.2
  google:
    enabled: true
    per_query: 10
    delay_seconds: 1.0
    # false means only SerpAPI titles/snippets are analyzed.
    # Set true only for authorized monitoring scopes where fetching result pages is acceptable.
    fetch_pages: false

notify:
  min_severity: medium
