name: leak-api-key-monitor

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "15 */3 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Sources to run: github,google"
        required: false
        default: "github,google"
      max_queries:
        description: "Max query count for this run"
        required: false
        default: "24"

permissions:
  contents: write
  actions: read

concurrency:
  group: leak-api-key-monitor
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Prepare target config
        run: |
          mkdir -p config data dist
          if [ -n "${{ secrets.TARGETS_YAML }}" ]; then
            printf "%s\n" "${{ secrets.TARGETS_YAML }}" > config/targets.yml
          elif [ ! -f config/targets.yml ]; then
            cp config/targets.example.yml config/targets.yml
          fi

      - name: Run leak monitor
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_KEYS: ${{ secrets.SERPAPI_KEYS }}
          SERPAPI_KEY_1: ${{ secrets.SERPAPI_KEY_1 }}
          SERPAPI_KEY_2: ${{ secrets.SERPAPI_KEY_2 }}
          SERPAPI_KEY_3: ${{ secrets.SERPAPI_KEY_3 }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          PRIVATE_REPORT_USER: ${{ secrets.PRIVATE_REPORT_USER }}
          PRIVATE_REPORT_PASSWORD: ${{ secrets.PRIVATE_REPORT_PASSWORD }}
          AUTHORIZED_VALIDATION_TARGETS_JSON: ${{ secrets.AUTHORIZED_VALIDATION_TARGETS_JSON }}
        run: |
          SOURCES="${{ github.event.inputs.sources || 'github,google' }}"
          MAX_QUERIES="${{ github.event.inputs.max_queries || '24' }}"
          python main.py scan \
            --config config/targets.yml \
            --data-dir data \
            --output-dir dist \
            --sources "${SOURCES}" \
            --max-queries "${MAX_QUERIES}" \
            --notify

      - name: Persist redacted history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/findings.json data/last_run.json || true
          git diff --cached --quiet || git commit -m "chore(data): update leak monitor findings [skip ci]"
          git push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: leak-monitor-report
          path: dist
          if-no-files-found: warn

      - name: Publish GitHub Pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/leak-api-key-pages
          mkdir -p /tmp/leak-api-key-pages
          cp -R dist/. /tmp/leak-api-key-pages/
          cd /tmp/leak-api-key-pages
          git init -b gh-pages
          git add .
          git commit -m "chore(pages): publish leak monitor report"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
