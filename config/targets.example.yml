# Copy this file to config/targets.yml locally, or set GitHub Secret TARGETS_YAML.
# Keep targets focused on your own brands, domains, repos, project names, or customer identifiers.

timezone: Asia/Shanghai
max_queries: 36

targets:
  keywords: []
  domains: []
  owners: []
  repos: []

queries:
  source_groups:
    github:
      path_signal:
        - '"/api/providers" "sk-"'
        - '"api/providers" "OPENAI_BASE_URL"'
      provider_config:
        - '"/api/providers" "baseUrl" "apiKey"'
        - '"api/providers" "baseURL" "apiKey"'
        - '"api/providers" "base_url" "api_key"'
        - '"providers" "baseUrl" "apiKey" "models"'
      llm_openai_compatible:
        - '"OPENAI_API_KEY" "OPENAI_BASE_URL"'
        - '"OPENAI_API_KEY=" "sk-"'
        - '"Authorization: Bearer sk-"'
        - '"api_key" "sk-" "base_url"'
        - '"chat/completions" "sk-"'
        - '"v1/models" "sk-"'
    google:
      path_signal:
        - 'inurl:/api/providers "baseUrl" "apiKey"'
        - 'inurl:/api/providers "baseURL" "apiKey"'
        - 'inurl:/api/providers "base_url" "api_key"'
        - 'inurl:/api/providers "sk-"'
      provider_config:
        - '"/api/providers" "baseUrl" "apiKey"'
        - '"api/providers" "baseURL" "apiKey"'
        - '"api/providers" "models" "baseUrl"'
      llm_openai_compatible:
        - '"OPENAI_API_KEY=" "sk-"'
        - '"Authorization: Bearer sk-"'
        - '"base_url" "https://" "sk-"'
  target_templates:
    - '"{target}" "OPENAI_API_KEY" "sk-"'
    - '"{target}" "OPENAI_BASE_URL" "https://"'
    - '"{target}" "base_url" "sk-"'
    - '"{target}" "baseURL" "apiKey"'
    - '"{target}" "api_base" "https://"'
    - '"{target}" "Authorization: Bearer sk-"'
    - '"{target}" "chat/completions" "sk-"'
    - '"{target}" "v1/models" "sk-"'
    - '"{target}" "api/providers" "baseUrl" "apiKey"'
    - '"{target}" "api/providers" "baseUrl" "sk-"'
    - '"{target}" inurl:/api/providers "apiKey"'
    - '"{target}" "api_key" "model"'
    - '"{target}" "ANTHROPIC_API_KEY"'
    - '"{target}" "DEEPSEEK_API_KEY"'
    - '"{target}" "gemini" "sk-"'
    - '"{target}" "OPENROUTER_API_KEY"'

sources:
  github:
    enabled: true
    per_query: 12
    delay_seconds: 1.2
  google:
    enabled: true
    per_query: 10
    delay_seconds: 1.0
    # false means only SerpAPI titles/snippets are analyzed.
    # Set true only for authorized monitoring scopes where fetching result pages is acceptable.
    fetch_pages: false

notify:
  min_severity: medium
